<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Chào mừng đến với Catka</title>
</head>
<body style="margin: 0; padding: 0; background-color: #f6f9fc;">
    <div style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; border: 1px solid #eee; border-radius: 8px; background-color: #ffffff;">
        <h2 style="color: #1686cb; text-align: center;">Chào mừng đến với Catka</h2>
        <p style="font-size: 16px; color: #333;">Chào <strong>{{Username}}</strong>,</p>
        <p style="font-size: 16px; color: #333;">Chúc mừng bạn đã đăng ký thành công tài khoản trên hệ thống Catka (Catka PMS).</p>
        <p style="font-size: 16px; color: #333;">Vui lòng nhấn nút bên dưới để đăng nhập và bắt đầu trải nghiệm dịch vụ của chúng tôi:</p>
        <div style="text-align: center; margin: 30px 0;">
            <a href="{{LoginLink}}" style="background-color: #1686cb; color: white; padding: 12px 24px; text-decoration: none; border-radius: 4px; font-weight: bold; display: inline-block;">Đăng nhập ngay vào Catka</a>
        </div>
        <p style="font-size: 14px; color: #888; text-align: center; margin-top: 40px;">Cảm ơn bạn đã lựa chọn Catka!</p>
    </div>
</body>
</html>
